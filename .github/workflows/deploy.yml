name: Build and Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Unit test
        run: pnpm run test

      - name: Identification test
        run: pnpm run test:identification

      - name: Integration test
        run: pnpm run test:integration

      - name: Database migration test
        run: pnpm run test:migration

      - name: Client dependency license check
        run: pnpm run check:licenses

      - name: Brand identification benchmark
        run: pnpm run benchmark:brand

      - name: Recalibrate visual matching validation
        run: pnpm run recalibrate:visual

      - name: Reassess catalog candidates with strict evidence rules
        run: pnpm run reassess:drive-candidates

      - name: Verify real-image identification results
        run: pnpm run verify:identification

      - name: Set build metadata
        run: echo "VITE_BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Build
        run: pnpm run build
        env:
          VITE_GIT_COMMIT: ${{ github.sha }}

      - name: Bundle size budget
        run: pnpm run check:bundle

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Upload production build for QA
        uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist
          retention-days: 1

  qa:
    name: Production Preview E2E
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download production build
        uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: dist
      - name: Install Chromium and WebKit
        run: pnpm exec playwright install --with-deps chromium webkit
      - name: Download Drive validation images to runner temp
        run: pnpm run download:drive-images
        env:
          DRIVE_IMAGE_DIR: ${{ runner.temp }}/sake-drive-images
      - name: Start production preview
        run: pnpm exec vite preview --host 127.0.0.1 --port 4173 &
      - name: E2E on production build
        id: production-e2e
        continue-on-error: true
        run: pnpm run test:e2e
        env:
          E2E_BASE_URL: http://127.0.0.1:4173/sake-log/
          DRIVE_IMAGE_DIR: ${{ runner.temp }}/sake-drive-images

      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Report E2E failures
        if: steps.production-e2e.outcome == 'failure'
        run: node scripts/report-playwright-failures.mjs

  ios:
    name: iOS Vision Build
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:native
      - name: Sync Capacitor iOS
        run: pnpm exec cap sync ios
      - name: Build iOS simulator app
        run: xcodebuild -project ios/App/App.xcodeproj -scheme App -configuration Debug -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build
      - run: node scripts/check-native-contract.mjs ios

  android:
    name: Android ML Kit Build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:native
      - name: Sync Capacitor Android
        run: pnpm exec cap sync android
      - name: Build and test Android
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest assembleDebug --stacktrace
      - run: node scripts/check-native-contract.mjs android

  native-contract:
    name: Native Contract and License Boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-native-contract.mjs all
      - run: node scripts/check-native-models.mjs

  deploy:
    name: Deploy
    needs:
      - build
      - qa
      - ios
      - android
      - native-contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke:
    name: Public Pages Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Wait for Pages propagation
        run: sleep 20
      - name: Public smoke test
        run: pnpm exec playwright test --project=Android --grep "mobile navigation"
        env:
          E2E_BASE_URL: https://yojiro1117.github.io/sake-log/
