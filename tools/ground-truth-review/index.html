<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SAKEログ Ground Truth Review</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Ground Truth Review</h1>
    <label>画像フォルダ <input id="images" type="file" accept="image/*,.heic,.heif" webkitdirectory multiple></label>
    <label>既存JSON <input id="truth" type="file" accept="application/json"></label>
    <button id="export">差分JSONを出力</button>
  </header>
  <main>
    <aside><input id="search" placeholder="ファイル名・銘柄を検索"><div id="list"></div></aside>
    <section id="editor"><p>左の画像を選択してください。</p></section>
  </main>
  <script type="module" src="review.js"></script>
</body>
</html>
